stages:
  - test
  - build
  - deploy

# ---------- Global variables ----------
variables:
  IMAGE_TAG: "latest" # You can also use ${CI_COMMIT_SHORT_SHA}

  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 467737512811
  ECR_REPO: t-drive
  URL_REGISTRY: 467737512811.dkr.ecr.ap-south-1.amazonaws.com/t-drive
  IMAGE_NAME: t-drive-app
  IMAGE_URI: 467737512811.dkr.ecr.ap-south-1.amazonaws.com/t-drive:latest
  CONTAINER_NAME: frontend
  HOST_PORT: 5173
  CONTAINER_PORT: 5173

  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
# TEST ----------
test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - echo " Installing dependencies..."
    - npm install --legacy-peer-deps
  only:
    - main
    - develop
    - /^feature\/.*$/
    - merge_requests

#BUILD & PUSH ----------
build_and_push:
  stage: build
  image: docker:25.0.3
  services:
    - docker:25.0.3-dind

  variables:
    AWS_REGION: ap-south-1
    IMAGE_URI: 467737512811.dkr.ecr.ap-south-1.amazonaws.com/t-drive:latest

  before_script:
    - apk add --no-cache python3 py3-pip curl jq
    - python3 -m venv ~/awscli-venv
    - source ~/awscli-venv/bin/activate
    - pip install --upgrade awscli
    - aws --version
    # FOR DEBUG 
    - env | grep AWS || true

    # VERIFY IDENTITY
    - aws sts get-caller-identity

    # LOGIN TO ECR
    - aws ecr get-login-password --region "$AWS_REGION" |
      docker login --username AWS --password-stdin 467737512811.dkr.ecr.ap-south-1.amazonaws.com

  script:
    - docker build -t "$IMAGE_URI" .
    - docker push "$IMAGE_URI"

  only:
    - main


# ---------- DEPLOY ----------
deploy_to_ec2:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - |
      if [ -n "$EC2_SSH_KEY_B64" ]; then
        echo "$EC2_SSH_KEY_B64" | base64 -d > ~/.ssh/id_rsa
      else
        echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
      fi
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$EC2_PUBLIC_IP" >> ~/.ssh/known_hosts || true

  script:
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$EC2_USER@$EC2_PUBLIC_IP" \
      "AWS_REGION=$AWS_REGION \
       URL_REGISTRY=$URL_REGISTRY \
       IMAGE_URI=$IMAGE_URI \
       CONTAINER_NAME=$CONTAINER_NAME \
       HOST_PORT=$HOST_PORT \
       CONTAINER_PORT=$CONTAINER_PORT \
       bash -s" <<'SSH_EOF'

      set -euo pipefail

      echo " Logging in to ECR..."
      aws ecr get-login-password --region "$AWS_REGION" \
        | docker login --username AWS --password-stdin "$URL_REGISTRY"

      echo "Pulling latest image: $IMAGE_URI"
      docker pull "$IMAGE_URI"

      echo " Removing old container (if exists)..."
      if docker ps -aq -f name="$CONTAINER_NAME" | grep -q .; then
        docker stop "$CONTAINER_NAME" || true
        docker rm "$CONTAINER_NAME" || true
      fi

      echo " Starting new container..."
      docker run -d --name "$CONTAINER_NAME" \
        -p "$HOST_PORT:$CONTAINER_PORT" \
        -e AWS_REGION="$AWS_REGION" \
        -e PORT="$CONTAINER_PORT" \
        --restart unless-stopped \
        "$IMAGE_URI"

      echo "Deployment complete.. Container running: $CONTAINER_NAME"

      SSH_EOF

  only:
    - main
